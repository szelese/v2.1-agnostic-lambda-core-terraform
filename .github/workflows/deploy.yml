name: Deploy to AWS Lambda (v2.1)

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERSION: "pending" 
    steps:
      - name: Set start time
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Checkout Application Code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/v2-agnostic-lambda-core
          path: app

      - name: Quality and Security Gate (App Code)
        run: |
          pip install flake8 bandit pytest
          flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
          bandit -r app -ll
          pytest app/tests

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.GHA_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY_NAME }}
          IMAGE_TAG: latest
        run: |
          cd app
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --push .
      
      - name: Deploy and Set Version
        run: |
            # 1. Update Lambda code with the new image
            aws lambda update-function-code \
              --function-name ${{ vars.LAMBDA_FUNCTION_NAME }} \
              --image-uri ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY_NAME }}:latest
            
            # 2. Wait for the update to stabilize
            echo "Waiting for Lambda update to complete..."
            aws lambda wait function-updated --function-name ${{ vars.LAMBDA_FUNCTION_NAME }}
            
            # 3. Update version environment variable
            SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
            echo "VERSION=$SHORT_SHA" >> $GITHUB_ENV
            aws lambda update-function-configuration \
              --function-name ${{ vars.LAMBDA_FUNCTION_NAME }} \
              --environment "Variables={VERSION=$SHORT_SHA}"

      - name: Smart Smoke Test (Version Validation)
        run: |
          EXPECTED_VERSION=$(echo ${{ github.sha }} | cut -c1-7)
          echo "Waiting for version: $EXPECTED_VERSION"
          for i in {1..20}; do
            RESPONSE=$(curl -s ${{ secrets.LAMBDA_URL }})
            ACTUAL_VERSION=$(echo $RESPONSE | python3 -c "import sys, json; print(json.load(sys.stdin).get('version', ''))")
            echo "Check $i: Actual version in cloud: '$ACTUAL_VERSION'"
            if [ "$ACTUAL_VERSION" == "$EXPECTED_VERSION" ]; then
              echo "Success: Version ($ACTUAL_VERSION) is live!"
              exit 0
            fi
            sleep 2
          done
          exit 1